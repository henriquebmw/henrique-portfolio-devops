name: MelodyMind - Android Build Pipeline

on:
  push:
    paths:
      - "projects/MelodyMind/**"
      - ".github/workflows/android-ci.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    defaults:
      run:
        working-directory: projects/MelodyMind

    # ------------------------------------------------------
    # Export versionCode/versionName to release job
    # ------------------------------------------------------
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}

    steps:
      # ------------------------------------------------------
      # CHECKOUT
      # ------------------------------------------------------
      - name: Checkout repo
        uses: actions/checkout@v4

      # ------------------------------------------------------
      # JDK 17
      # ------------------------------------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      # ------------------------------------------------------
      # ANDROID SDK
      # ------------------------------------------------------
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android Platform + Build Tools
        run: |
          # ensure we have the correct command-line tools version
          sdkmanager --install "cmdline-tools;12.0"
          sdkmanager --install "platforms;android-36" "build-tools;35.0.0" "platform-tools"
          yes | sdkmanager --licenses

      # ------------------------------------------------------
      # MAKE GRADLE WRAPPER EXECUTABLE
      # ------------------------------------------------------
      - name: Make gradlew executable
        run: chmod +x gradlew

      # ------------------------------------------------------
      # AUTO BUMP versionCode
      # ------------------------------------------------------
      - name: Auto bump versionCode
        run: ./gradlew bumpVersionCode --no-daemon

      - name: Commit updated versionCode
        run: |
          git config --global user.email "ci-bot@github.com"
          git config --global user.name "CI Bot"
          git add gradle.properties
          git commit -m "CI: Bump versionCode" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------
      # EXTRACT VERSION INFO
      # ------------------------------------------------------
      - name: Extract app version
        id: version
        run: |
          VERSION_NAME=$(./gradlew -q printVersionName)
          VERSION_CODE=$(./gradlew -q printVersionCode)
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      # ------------------------------------------------------
      # BUILD DEBUG
      # ------------------------------------------------------
      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

      # ------------------------------------------------------
      # BUILD RELEASE (APK + AAB)
      # ------------------------------------------------------
      - name: Build Release APK & AAB
        run: ./gradlew :app:assembleRelease :app:bundleRelease --stacktrace --no-daemon

      # ------------------------------------------------------
      # UPLOAD ARTIFACTS
      # ------------------------------------------------------
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: MelodyMind-debug-${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.version_code }}
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: MelodyMind-release-${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.version_code }}
          path: app/build/outputs/apk/release/*.apk

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: MelodyMind-release-bundle-${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.version_code }}
          path: app/build/outputs/bundle/release/*.aab

  # ---------------------------------------------------------------------------
  # RELEASE JOB: Attach artifacts to GitHub Release
  # ---------------------------------------------------------------------------
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version_name }}
          name: MelodyMind v${{ needs.build.outputs.version_name }}
          draft: false
          prerelease: false
          files: |
            MelodyMind-debug-*/MelodyMind*.apk
            MelodyMind-release-*/MelodyMind*.apk
            MelodyMind-release-bundle-*/MelodyMind*.aab
