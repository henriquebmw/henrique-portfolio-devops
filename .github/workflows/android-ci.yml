name: MelodyMind - Android APK Build

on:
  push:
    paths:
      - "projects/MelodyMind/**"
      - ".github/workflows/android-ci.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: projects/MelodyMind

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform & build-tools
        run: |
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools"
          yes | sdkmanager --licenses

      # ✅ Gradle cache
      - name: Set up Gradle (cache)
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Ensure gradlew is executable
        run: chmod +x gradlew

      # ✅ Warm-up timeouts
      - name: Warm Gradle with retries
        run: |
          set +e
          for i in {1..3}; do
            echo "Attempt $i to warm Gradle..."
            ./gradlew --no-daemon --version && exit 0
            echo "Warm-up failed, retrying in 15s..."
            sleep 15
          done
          echo "Gradle warm-up failed after 3 attempts."
          exit 1

      - name: Build Debug APK
        run: ./gradlew --no-daemon :app:assembleDebug --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MelodyMind-debug-apk
          path: app/build/outputs/apk/debug/*.apk
