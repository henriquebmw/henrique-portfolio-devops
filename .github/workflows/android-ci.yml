name: MelodyMind - Android APK Build

on:
  push:
    paths:
      - "projects/MelodyMind/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: projects/MelodyMind   # ensures all run steps are inside module

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android platform & build-tools
      run: |
        sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools"
        yes | sdkmanager --licenses

    - name: Grant execute permission for Gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew :app:assembleDebug --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MelodyMind-debug-apk
        path: app/build/outputs/apk/debug/*.apk
