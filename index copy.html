<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<title>Windows XP - Henrique Teixeira</title>
<link rel='stylesheet' href='style.css' />
</head>
<body>
<div id='boot-screen' class='boot-screen'>
  <div class='boot-logo'>Windows <span class='xp'>XP</span></div>
  <div class='boot-bar'>
    <div class='boot-bar-fill'></div>
  </div>
</div>

<div class='login-box' id='loginBox' style='display:none'>
  <div class='titlebar'>
    <div class='title'>Welcome</div>
    <button id='shutdownBtn' class='shutdown-btn' title='Shut Down'>⏻</button>
  </div>

  <div class='click-hint'>Click your username to begin</div>

  <div class='user-card' id='userCard'>
     <img src='assets/user.png' class='avatar' alt='User'/>
     <div class='username'>Henrique Teixeira</div>
  </div>

  <div class='icons-row' id='iconsRow' style='display:none'>
     <a class='xp-icon' href='assets/Henrique.Teixeira_CV_2025.pdf' target='_blank'>
        <img src='assets/cv.png' alt='CV'/>
        <span>My Curriculum</span>
     </a>
     <a class='xp-icon' href='https://github.com/henriquebmw/henrique-portfolio-devops' target='_blank'>
        <img src='assets/github.png' alt='GitHub'/>
        <span>GitHub</span>
     </a>
  </div>
</div>

<div class='shutdown-modal' id='shutdownModal' style='display:none'>
  <div class='shutdown-box'>
    <img src='assets/shutdown.png' class='shutdown-icon'/>
    <div class='shutdown-title'>Turn off computer</div>
    <div class='shutdown-actions'>
      <button id='cancelShutdown' class='btn'>Cancel</button>
      <button id='confirmShutdown' class='btn danger'>Shut Down</button>
    </div>
  </div>
</div>

<audio id='hoverSound' src='assets/hover.wav' preload='auto'></audio>

<script>
  // Boot screen fake load
  setTimeout(()=>{
    document.getElementById('boot-screen').style.opacity = 0;
    setTimeout(()=>{
      document.getElementById('boot-screen').style.display='none';
      document.body.style.backgroundImage = 'url("assets/bliss_like.png")';
      document.getElementById('loginBox').style.display='block';
      document.getElementById('loginBox').classList.add('fade-in');
    }, 600);
  }, 1400);

  // User click to begin
  const userCard = document.getElementById('userCard');
  const iconsRow = document.getElementById('iconsRow');
  userCard.addEventListener('click', ()=>{
     userCard.classList.add('selected');
     iconsRow.style.display = 'flex';
  });

  // Hover sound
  const hoverSound=document.getElementById('hoverSound');
  function playHover(){
    try { hoverSound.currentTime = 0; hoverSound.play(); } catch(e){}
  }
  Array.from(document.querySelectorAll('.xp-icon, .user-card, .shutdown-btn, .btn')).forEach(el=>{
    el.addEventListener('mouseenter', playHover);
  });

  // Shutdown
  const shutdownBtn=document.getElementById('shutdownBtn');
  const shutdownModal=document.getElementById('shutdownModal');
  const cancelShutdown=document.getElementById('cancelShutdown');
  const confirmShutdown=document.getElementById('confirmShutdown');
  shutdownBtn.addEventListener('click', ()=> shutdownModal.style.display='flex');
  cancelShutdown.addEventListener('click', ()=> shutdownModal.style.display='none');
  confirmShutdown.addEventListener('click', ()=>{
    const overlay=document.createElement('div');
    overlay.style.position='fixed';
    overlay.style.inset='0';
    overlay.style.background='#000';
    overlay.style.opacity='0';
    overlay.style.transition='opacity .7s ease';
    document.body.appendChild(overlay);
    setTimeout(()=> overlay.style.opacity='1', 20);
  });
</script>
</body>
</html>
